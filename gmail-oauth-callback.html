<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'">
  <title>Gmail · Telegram</title>
  <style>
    :root{font-family:system-ui,sans-serif;color:#172033;background:#eef3f8}
    body{min-height:100vh;margin:0;display:grid;place-items:center}
    main{box-sizing:border-box;width:min(430px,calc(100% - 32px));padding:28px;border-radius:20px;background:#fff;text-align:center;box-shadow:0 12px 36px #1720331a}
    h1{font-size:21px;margin:0 0 12px}p{line-height:1.5;color:#586174;margin:0}
  </style>
</head>
<body>
  <main>
    <h1 id="title">Завершуємо підключення Gmail</h1>
    <p id="message">Безпечно повертаємося до поштового сервісу.</p>
  </main>
  <script>
    (function () {
      "use strict";
      var params = new URLSearchParams(location.search);
      var state = String(params.get("state") || "");
      var code = String(params.get("code") || "");
      var error = String(params.get("error") || "");
      history.replaceState(null, "", location.pathname);

      if (error) {
        document.getElementById("title").textContent = "Google не завершив підключення";
        document.getElementById("message").textContent = "Поверніться до Telegram і повторіть дію, коли будете готові.";
        return;
      }
      if (!/^[A-Za-z0-9_-]{43}$/.test(state) || !/^4\/[A-Za-z0-9._-]{20,2048}$/.test(code)) {
        document.getElementById("title").textContent = "Некоректна відповідь Google";
        document.getElementById("message").textContent = "OAuth-відповідь відхилено без передавання даних.";
        return;
      }

      var callback = new URL("https://script.google.com/macros/s/AKfycbwQkmQIIsboUayMhWdv_DzGj_gbERMKdWEpUVUpIjvwTaIjyjyLaBWUmw1g3lFWFV3Z/exec");
      callback.searchParams.set("action", "gmail_oauth_callback");
      callback.searchParams.set("state", state);
      callback.searchParams.set("code", code);
      location.replace(callback.toString());
    }());
  </script>
</body>
</html>
