name: Bilingual documentation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Ukrainian and English documentation
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          args=(--head "$HEAD_SHA")
          if [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]]; then
            args+=(--base "$BASE_SHA")
          fi
          python3 tools/check_bilingual_docs.py "${args[@]}"
